<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncing Session - Google Workspace AutoBot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #4285F4;
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        h1 {
            margin: 0 0 0.5rem 0;
            font-weight: 700;
            font-size: 1.8rem;
        }

        p {
            opacity: 0.7;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .terminal {
            background: #000;
            color: #10b981;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 1rem;
            border-radius: 12px;
            height: 180px;
            overflow-y: auto;
            text-align: left;
            margin: 1.5rem 0;
            border: 1px solid rgba(16, 185, 129, 0.2);
            white-space: pre-wrap;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover {
            background: #3367d6;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(66, 133, 244, 0.15);
            color: var(--primary);
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="glass-panel">
            <div class="status-badge">SESSION SYNC REQUIRED</div>
            <h1>Connect to Admin Console</h1>
            <p>To access the dashboard, we need to sync a Selenium session for <strong>{{ domain }}</strong> in the
                background.</p>

            <div class="user-info">
                <div style="text-align: left;">
                    <div style="font-weight: 600;">Authenticating Account</div>
                    <div style="font-size: 0.8rem; opacity: 0.6;">{{ email }}</div>
                </div>
            </div>

            <div id="sync-form-container">
                <form id="sync-form">
                    <input type="password" name="password" id="password" placeholder="Enter Admin Password" required>
                    <button type="submit" class="btn" id="start-btn">Start Synchronizing</button>
                </form>
            </div>

            <div id="progress-container" style="display: none;">
                <div class="terminal" id="sync-terminal">Waiting for connection...</div>
                <p id="hint-text" style="font-style: italic; color: #a855f7; display: none;">Check your phone for Google
                    verification prompt!</p>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('sync-form');
        const terminal = document.getElementById('sync-terminal');
        const hint = document.getElementById('hint-text');
        const startBtn = document.getElementById('start-btn');
        const progressContainer = document.getElementById('progress-container');
        const formContainer = document.getElementById('sync-form-container');

        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${protocol}//${window.location.host}/ws/logs`);

        socket.onmessage = function (event) {
            const data = event.data;
            terminal.innerText += data;
            terminal.scrollTop = terminal.scrollHeight;

            if (data.includes('IDENTITY VERIFICATION REQUIRED')) {
                hint.style.display = 'block';
            }

            if (data.includes('[SUCCESS] Active session found') || data.includes('[SUCCESS] Verification completed') || data.includes('Finalizing login...')) {
                terminal.innerText += "\n[SYSTEM] Login Successful! Redirecting to Dashboard...";
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            }
        };

        async function startSync(password = null) {
            startBtn.disabled = true;
            formContainer.style.display = 'none';
            progressContainer.style.display = 'block';
            terminal.innerText = "[SYSTEM] Initializing Bot...\n";

            try {
                const body = password ? `password=${encodeURIComponent(password)}` : '';
                const response = await fetch('/sync-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'Failed to start sync');
                }
            } catch (err) {
                terminal.innerText += `\n[ERROR] ${err.message}`;
                startBtn.disabled = false;
                formContainer.style.display = 'block';
                progressContainer.style.display = 'none';
            }
        }

        // Try automatic sync on page load
        window.onload = () => {
            // We can't know for sure if password exists, but we can try
            // If it fails with 400, it will show the form again
            startSync();
        };

        form.onsubmit = (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            startSync(password);
        };
    </script>
</body>

</html>
