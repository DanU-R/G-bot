name: Google Workspace Activator

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual run from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 undetected-chromedriver

    - name: Run Activator Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Run with limit of 10 accounts per execution to be safe
        # Headless is default in script now
        python google_workspace_activator.py --limit 10 --telegram

    - name: Commit Processed IDs
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add processed_ids.txt
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update processed_ids.txt" && git push)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
