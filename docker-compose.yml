version: '3.8'

services:
  autobot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chrome_profile:/app/chrome_profile
    restart: always

# Ensure .env contains:
# GOOGLE_CLIENT_ID=your_id
# GOOGLE_CLIENT_SECRET=your_secret
# MASTER_KEY=your_fernet_key
# SESSION_SECRET=your_secret
